name: Build and Push Docker Image

# 1. Trigger the pipeline on every push to the "main" branch
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Runs on GitHub's free cloud servers

    steps:
    # 2. Check out your code from GitHub into the runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # 3. Log into your personal Docker Hub account securely
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 4. Set up Docker Build tools on the runner
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 5. Build the Docker image from your Dockerfile and push it online
    - name: Build and Push Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Replace 'your-dockerhub-username' and 'your-app-name'
        tags: |
          galgalcloudeg/cloud-test-app:latest
          galgalcloudeg/cloud-test-app:${{ github.sha }}

